server:
  port: 8083
  error:
    include-message: always

spring:
  application:
    name: lending-service
  datasource:
    url: jdbc:postgresql://localhost:5432/plp_db?currentSchema=plp_lending
    username: plp_admin
    password: plp_secret_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: plp_lending
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    schemas: plp_lending
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: plp_redis_2026
  rabbitmq:
    host: localhost
    port: 5672
    username: plp_rabbit
    password: plp_rabbit_2026

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

plp:
  dev-reset:
    enabled: false

  lms:
    encore:
      base-url: ${ENCORE_BASE_URL:https://core.dev.billionloans.com/encore/}
      schema: ${ENCORE_SCHEMA:http}
      hostname: ${ENCORE_HOSTNAME:encore.bl-internal.com}
      port: ${ENCORE_PORT:8080}
      api-username: ${ENCORE_API_USERNAME:}
      api-password: ${ENCORE_API_PASSWORD:}
      api:
        create-loan-account: webservices/loans/accounts/openAccount
        post-transactions: webservices/loans/accounts/postTransactions
        reverse-transactions: webservices/loans/accounts/reverseTransactions
        find-summaries: webservices/loans/accounts/findSummaries
        find-summary: webservices/loans/accounts/findSummary
        find-accounts: webservices/loans/accounts/findLoanOdAccounts
        find-working-date: webservices/loans/accounts/findBankWorkingDate
        create-product: webservices/v2/createLoanProduct
        find-account-statement: webservices/loans/accounts/findAccountStatements
        get-preclose-amt-by-value-dt: webservices/loans/accounts/findPreclosureAmountAsOfDate
        find-od-product-info: webservices/loans/accounts/findLoanOdProduct
        find-pre-open-summary: webservices/findPreOpenSummary
        find-loan-info: webservices/findLoanInfo
      currency: ${ENCORE_CURRENCY:INR}
      admin-branch: ${ENCORE_ADMIN_BRANCH:MGPP}
      casa-branch-code: ${ENCORE_CASA_BRANCH_CODE:MGPP}
      casa-product-code: ${ENCORE_CASA_PRODUCT_CODE:C100}
      loan-product-type: ${ENCORE_LOAN_PRODUCT_TYPE:Loans}
      investment-account-id: ${ENCORE_INVESTMENT_ACCOUNT_ID:000010000001}
      default-pin-code: ${ENCORE_DEFAULT_PIN_CODE:600001}
      connect-timeout-ms: ${ENCORE_CONNECT_TIMEOUT:10000}
      read-timeout-ms: ${ENCORE_READ_TIMEOUT:30000}
      max-retries-for-get: ${ENCORE_GET_RETRIES:2}
      retry-backoff-ms: ${ENCORE_RETRY_BACKOFF_MS:500}
