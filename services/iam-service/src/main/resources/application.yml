server:
  port: 8081

spring:
  application:
    name: iam-service
  datasource:
    url: jdbc:postgresql://localhost:5432/plp_db?currentSchema=plp_iam
    username: plp_admin
    password: plp_secret_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: plp_iam
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    schemas: plp_iam
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: plp_redis_2026

jwt:
  secret: PLP-JWT-SECRET-KEY-CHANGE-IN-PRODUCTION-MIN-64-BYTES-LONG-2026!!
  access-token-expiry-ms: 28800000
  refresh-token-expiry-ms: 86400000

# Dev-only: allow POST /api/v1/dev/reset-* when true (always false in production).
plp:
  los-integration:
    api-key: ${PLP_LOS_INTEGRATION_API_KEY:plp-los-integration-dev-key}
    default-user-password: ${PLP_INTEGRATION_DEFAULT_USER_PASSWORD:ChangeMe@PLP2026}
  dev-reset:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
